<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GEMMA - New Patient</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;family=Public+Sans:wght@600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#002452",
                        "on-error": "#ffffff",
                        "tertiary-fixed": "#ffe08b",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-low": "#f0f4f8",
                        "on-primary": "#ffffff",
                        "error": "#ba1a1a",
                        "on-secondary-fixed": "#002203",
                        "secondary-fixed-dim": "#95d78d",
                        "on-tertiary-fixed": "#241a00",
                        "surface-container-highest": "#dfe3e7",
                        "error-container": "#ffdad6",
                        "on-tertiary": "#ffffff",
                        "secondary": "#2e6b2e",
                        "tertiary-fixed-dim": "#f0c110",
                        "secondary-fixed": "#b0f3a6",
                        "surface-container": "#eaeef2",
                        "outline-variant": "#c4c6d0",
                        "surface-variant": "#dfe3e7",
                        "surface-dim": "#d6dade",
                        "on-secondary-container": "#326f32",
                        "surface-tint": "#425e91",
                        "primary-container": "#1b3a6b",
                        "surface-bright": "#f6fafe",
                        "secondary-container": "#adf0a4",
                        "surface-container-high": "#e4e9ed",
                        "on-tertiary-container": "#4f3d00",
                        "on-primary-fixed": "#001a40",
                        "on-secondary-fixed-variant": "#135218",
                        "background": "#f6fafe",
                        "inverse-surface": "#2c3134",
                        "primary-fixed-dim": "#acc7ff",
                        "inverse-on-surface": "#edf1f5",
                        "on-primary-container": "#89a5dd",
                        "surface": "#f6fafe",
                        "on-primary-fixed-variant": "#294678",
                        "on-tertiary-fixed-variant": "#584400",
                        "on-error-container": "#93000a",
                        "on-secondary": "#ffffff",
                        "outline": "#747780",
                        "inverse-primary": "#acc7ff",
                        "on-surface": "#171c1f",
                        "on-surface-variant": "#44474f",
                        "primary-fixed": "#d7e2ff",
                        "tertiary": "#745b00",
                        "tertiary-container": "#d0a600",
                        "on-background": "#171c1f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-gap": "12px",
                        "container-padding": "16px",
                        "touch-target-min": "48px",
                        "section-gap": "24px",
                        "nav-height": "56px"
                    },
                    "fontFamily": {
                        "label-xl": ["Inter"],
                        "headline-md": ["Public Sans"],
                        "label-bold": ["Inter"],
                        "headline-lg": ["Public Sans"],
                        "button": ["Inter"],
                        "body-md": ["Inter"],
                        "body-lg": ["Inter"]
                    },
                    "fontSize": {
                        "label-xl": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "label-bold": ["16px", {"lineHeight": "20px", "fontWeight": "700"}],
                        "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],
                        "button": ["18px", {"lineHeight": "18px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            background-color: #f6fafe;
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="min-h-screen pb-32">
<!-- TopAppBar Shell -->
<header class="bg-blue-900 dark:bg-blue-950 text-white font-headline-md font-semibold docked full-width top-0 shadow-md flex items-center justify-between px-4 h-16 w-full fixed z-50">
<div class="flex items-center gap-4">
<button class="active:scale-95 transition-transform hover:opacity-80">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="text-xl font-headline-lg tracking-tight uppercase">NEW PATIENT</h1>
</div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</div>
</header>
<main class="pt-20 px-container-padding space-y-section-gap max-w-md mx-auto">
<!-- Patient Information Card -->
<section class="bg-white rounded-xl p-4 shadow-[0_2px_4px_rgba(27,58,107,0.08)] space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary" data-icon="person">person</span>
<h2 class="font-headline-md text-headline-md text-primary uppercase">Patient Information</h2>
</div>
<div class="space-y-stack-gap">
<div>
<label class="block text-label-bold font-label-bold text-on-surface-variant mb-1">Name</label>
<input class="w-full h-12 px-4 rounded-lg border border-primary outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-20 transition-all font-body-md text-body-md" placeholder="Juan dela Cruz" type="text"/>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-label-bold font-label-bold text-on-surface-variant mb-1">Age</label>
<input class="w-full h-12 px-4 rounded-lg border border-primary outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-20 transition-all font-body-md text-body-md" placeholder="Years" type="number"/>
</div>
<div>
<label class="block text-label-bold font-label-bold text-on-surface-variant mb-1">Sex</label>
<div class="flex h-12 bg-surface-container rounded-lg p-1">
<button class="flex-1 rounded-md font-label-bold text-label-bold bg-white text-primary shadow-sm">Male</button>
<button class="flex-1 rounded-md font-label-bold text-label-bold text-outline">Female</button>
</div>
</div>
</div>
<div>
<label class="block text-label-bold font-label-bold text-on-surface-variant mb-1">Address</label>
<input class="w-full h-12 px-4 rounded-lg border border-primary outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-20 transition-all font-body-md text-body-md" placeholder="Barangay, City" type="text"/>
</div>
</div>
</section>
<!-- Vital Signs Card -->
<section class="bg-white rounded-xl p-4 shadow-[0_2px_4px_rgba(27,58,107,0.08)] space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-primary" data-icon="monitor_heart">monitor_heart</span>
<h2 class="font-headline-md text-headline-md text-primary uppercase">Vital Signs <span class="text-sm font-normal text-outline-variant lowercase">(optional)</span></h2>
</div>
<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-label-bold font-label-bold text-on-surface-variant mb-1 text-sm">Blood Pressure</label>
<div class="relative">
<input class="w-full h-12 pl-4 pr-10 rounded-lg border border-primary outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-20 transition-all font-body-md text-body-md" placeholder="120/80" type="text"/>
<span class="absolute right-3 top-3 text-xs text-outline">mmHg</span>
</div>
</div>
<div>
<label class="block text-label-bold font-label-bold text-on-surface-variant mb-1 text-sm">Temperature</label>
<div class="relative">
<input class="w-full h-12 pl-4 pr-10 rounded-lg border border-primary outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-20 transition-all font-body-md text-body-md" placeholder="37.0" type="text"/>
<span class="absolute right-3 top-3 text-xs text-outline">°C</span>
</div>
</div>
</div>
</section>
<!-- Complaint Card -->
<section class="bg-white rounded-xl p-4 shadow-[0_2px_4px_rgba(27,58,107,0.08)] space-y-4">
<div class="flex items-center gap-2 mb-2">
<span class="material-symbols-outlined text-error" data-icon="report_problem">report_problem</span>
<h2 class="font-headline-md text-headline-md text-primary uppercase">Chief Complaint</h2>
</div>
<div>
<textarea class="w-full min-h-[120px] p-4 rounded-lg border border-primary outline-none focus:ring-2 focus:ring-primary focus:ring-opacity-20 transition-all font-body-md text-body-md resize-none" placeholder="Ilarawan ang mga sintomas at nararamdaman ng pasyente dito..."></textarea>
<p class="text-xs text-error mt-1 flex items-center gap-1">
<span class="material-symbols-outlined text-xs" data-icon="error_outline">error_outline</span>
                    Required field
                </p>
</div>
</section>
<!-- Camera Action -->
<div class="px-2">
<button class="w-full h-[52px] bg-white border border-primary text-primary rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all font-button text-button">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
                Take Photo
            </button>
</div>
<!-- Hero Visualization for medical context -->
<div class="rounded-xl overflow-hidden h-40 relative group">
<img alt="Medical assessment visual" class="w-full h-full object-cover" data-alt="A clean, sterile medical exam room setting for a health worker. The lighting is bright and professional, emphasizing a modern light-mode clinic environment. The color palette features clinical whites, deep primary navies, and soft surgical blues to create a calm and trustworthy mood for frontline healthcare interactions." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCmFouxReYrEqevjicEIEOP9ut7vkhTZeNqSV-na_tDE6dEXSlsfK1lRHdFPfbzEjQtnxyoB48ESyjibGubXQ9cHZ0NL5EPIZI54PCxMdtHElq511qsFhYONnJjCsMoaMkTl5G6JWIR3JVaTX9U9lb0OhcrMcLT8ZZKcSFNfFO0LH-T9h_OhE8DiDDh8C5eI7xkuk0n85u6lGModGRkCFrxtSzaGUYMnUsPKNYgDPAx7xY2rgMP8lQ63Km3bSS5SzR6OVyK0bVfjrw"/>
<div class="absolute inset-0 bg-gradient-to-t from-primary/60 to-transparent flex items-end p-4">
<p class="text-white text-xs font-label-bold uppercase tracking-widest opacity-90">Medical Contextual Guide</p>
</div>
</div>
</main>
<!-- Fixed Bottom CTA -->
<footer class="fixed bottom-0 left-0 right-0 bg-white dark:bg-slate-900 px-container-padding py-4 shadow-[0_-4px_16px_rgba(27,58,107,0.1)] z-50">
<div class="max-w-md mx-auto">
<button class="w-full h-[72px] bg-secondary text-white rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all font-button text-button shadow-lg shadow-secondary/20 uppercase">
<span class="material-symbols-outlined text-2xl" data-icon="analytics" data-weight="fill" style="font-variation-settings: 'FILL' 1;">analytics</span>
                ASSESS WITH GEMMA
            </button>
</div>
</footer>
<!-- Hidden BottomNav but defined per instructions for structural check if needed -->
<nav class="hidden">
<!-- Structural reference only -->
</nav>
</body></html>
