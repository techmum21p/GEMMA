<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "tertiary-fixed-dim": "#c6c6c7",
                    "surface-container": "#eeedf5",
                    "on-error-container": "#93000a",
                    "on-background": "#1a1b21",
                    "secondary-fixed": "#dbe3f1",
                    "surface-bright": "#faf8ff",
                    "on-surface-variant": "#444652",
                    "outline": "#747683",
                    "on-surface": "#1a1b21",
                    "primary-fixed-dim": "#b4c5ff",
                    "surface-variant": "#e3e2ea",
                    "on-tertiary-fixed-variant": "#454747",
                    "on-primary": "#ffffff",
                    "primary-container": "#003087",
                    "on-error": "#ffffff",
                    "secondary": "#575f6b",
                    "tertiary-fixed": "#e2e2e2",
                    "on-primary-fixed-variant": "#1c4197",
                    "on-secondary-container": "#5d6571",
                    "error": "#ba1a1a",
                    "on-secondary": "#ffffff",
                    "surface": "#faf8ff",
                    "outline-variant": "#c4c6d4",
                    "on-tertiary": "#ffffff",
                    "surface-container-high": "#e8e7ef",
                    "error-container": "#ffdad6",
                    "surface-container-low": "#f4f3fb",
                    "inverse-primary": "#b4c5ff",
                    "on-secondary-fixed": "#141c26",
                    "tertiary": "#212323",
                    "on-primary-fixed": "#00174b",
                    "inverse-surface": "#2f3036",
                    "on-primary-container": "#7f9df8",
                    "tertiary-container": "#363838",
                    "surface-container-highest": "#e3e2ea",
                    "on-tertiary-fixed": "#1a1c1c",
                    "primary": "#001d59",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#a0a1a1",
                    "on-secondary-fixed-variant": "#3f4752",
                    "secondary-container": "#dbe3f1",
                    "primary-fixed": "#dbe1ff",
                    "background": "#faf8ff",
                    "surface-dim": "#dad9e1",
                    "surface-tint": "#3959b0",
                    "inverse-on-surface": "#f1f0f8",
                    "secondary-fixed-dim": "#bfc7d4"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "xl": "32px",
                    "base": "8px",
                    "margin-mobile": "16px",
                    "md": "16px",
                    "gutter": "16px",
                    "sm": "8px",
                    "xs": "4px",
                    "lg": "24px"
            },
            "fontFamily": {
                    "body-md": ["Inter"],
                    "body-lg": ["Inter"],
                    "label-bold": ["Inter"],
                    "display": ["Inter"],
                    "caption": ["Inter"],
                    "h2": ["Inter"],
                    "label-md": ["Inter"],
                    "h1": ["Inter"]
            },
            "fontSize": {
                    "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                    "label-bold": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "display": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                    "caption": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                    "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                    "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes medicalPulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        .animate-medical-pulse {
            animation: medicalPulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        .progress-ring-circle {
            stroke-dasharray: 283;
            stroke-dashoffset: 70;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col items-center">
<!-- Top Navigation Bar (Shared Component Pattern) -->
<header class="bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 shadow-sm flex justify-between items-center w-full px-4 h-16 fixed top-0 z-50">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-900 dark:text-blue-300" data-icon="medical_services">medical_services</span>
<span class="font-inter font-bold tracking-tight text-xl font-black text-blue-900 dark:text-blue-100 uppercase tracking-widest">GEMMA</span>
</div>
<button class="bg-blue-50 dark:bg-blue-900/30 px-3 py-1 rounded-full text-blue-900 dark:text-blue-300 font-inter font-bold text-[12px] tracking-tight hover:bg-blue-100 active:opacity-80 transition-all duration-150">
            ON SHIFT
        </button>
</header>
<!-- Main Content Area: Loading / Analyzing Canvas -->
<main class="flex-1 w-full max-w-[390px] flex flex-col items-center justify-center px-margin-mobile pt-16 pb-20">
<!-- Background Decorative Element (Subtle Medical Branding) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none opacity-5">
<div class="absolute -top-10 -right-10 w-64 h-64 bg-primary-container rounded-full blur-3xl"></div>
<div class="absolute bottom-40 -left-20 w-80 h-80 bg-secondary-container rounded-full blur-3xl"></div>
</div>
<div class="relative flex flex-col items-center text-center z-10">
<!-- Central Animated Cross -->
<div class="relative mb-xl">
<div class="absolute inset-0 bg-primary-fixed blur-2xl opacity-40 animate-medical-pulse"></div>
<div class="relative w-24 h-24 bg-primary-container flex items-center justify-center rounded-2xl shadow-xl shadow-primary/20 animate-medical-pulse">
<span class="material-symbols-outlined text-[48px] text-on-primary" data-icon="add" style="font-variation-settings: 'wght' 700;">add</span>
</div>
</div>
<!-- Status Typography -->
<div class="space-y-sm mb-lg">
<h1 class="font-h1 text-h1 text-primary">Analyzing symptoms...</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">
                    Cross-referencing input with emergency triage protocols and clinical databases.
                </p>
</div>
<!-- Analysis Progress Grid (Bento Style Lite) -->
<div class="grid grid-cols-2 gap-md w-full max-w-sm mb-xl">
<div class="bg-surface-container-low border border-outline-variant/30 rounded-xl p-md flex flex-col items-start gap-xs">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="vital_signs">vital_signs</span>
<span class="font-label-bold text-caption text-secondary uppercase">Vitals</span>
<div class="w-full bg-outline-variant h-1 rounded-full mt-1 overflow-hidden">
<div class="bg-primary h-full w-full"></div>
</div>
</div>
<div class="bg-surface-container-low border border-outline-variant/30 rounded-xl p-md flex flex-col items-start gap-xs">
<span class="material-symbols-outlined text-primary text-[20px]" data-icon="clinical_notes">clinical_notes</span>
<span class="font-label-bold text-caption text-secondary uppercase">Severity</span>
<div class="w-full bg-outline-variant h-1 rounded-full mt-1 overflow-hidden">
<div class="bg-primary h-full w-[65%]"></div>
</div>
</div>
</div>
<!-- Circular Progress Indicator -->
<div class="relative flex items-center justify-center">
<svg class="w-20 h-20 transform -rotate-90">
<circle class="text-surface-container-highest" cx="40" cy="40" fill="transparent" r="36" stroke="currentColor" stroke-width="4"></circle>
<circle class="text-primary-container" cx="40" cy="40" fill="transparent" r="36" stroke="currentColor" stroke-dasharray="226" stroke-dashoffset="60" stroke-linecap="round" stroke-width="4"></circle>
</svg>
<div class="absolute inset-0 flex items-center justify-center">
<span class="font-label-bold text-primary">74%</span>
</div>
</div>
</div>
<!-- High-Trust Footer Image/Graphic -->
<div class="mt-auto w-full px-4 opacity-40">
<div class="relative h-24 w-full rounded-xl overflow-hidden border border-outline-variant">
<img alt="Medical Research" class="w-full h-full object-cover" data-alt="A clean, professional medical research laboratory setting with soft focus on high-precision diagnostic equipment. The lighting is clinical and bright, creating a high-trust atmosphere in a light-mode aesthetic. Subtle blues and whites dominate the palette, reinforcing the brand's medical authority. The overall mood is calm, advanced, and scientifically rigorous." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBupCxCgE8feD5_sqAj6m9Ik5ZwL1vCSfNYPyWzQreLSq-xrUNzhhNe2c2ejlDI9_dQzoIIBMo6A42TNuxEPrjT3kbKoPp3pptngz37ytXtl_PJOxaURmpwb_oJVt811JjqzPgl8G0f_syL0Fg6NZDtVIveTcHi7mDGr2iLnO339kW2PXfeJLi0ENOyGKPpDeqFj7k8U1DC75ZTFG06CdW_qIeTTwT7DzxdCCCDwUESKHhhWMHXVxAF0iW0xjMQGQP_GE2mitEitWmp"/>
<div class="absolute inset-0 bg-gradient-to-t from-background to-transparent"></div>
</div>
</div>
</main>
<!-- Bottom Navigation Bar (Shared Component Pattern) -->
<!-- Prohibited if this is a temporary/loading state, but provided here as a placeholder for context -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-safe bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 shadow-[0_-2px_10px_rgba(0,0,0,0.05)] h-[72px] z-50">
<div class="flex flex-col items-center justify-center text-blue-900 dark:text-blue-100 bg-blue-50 dark:bg-blue-900/40 rounded-xl px-4 py-1 active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined" data-icon="emergency" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-inter text-[11px] font-semibold uppercase">Triage</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-700 dark:hover:text-blue-300 active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-inter text-[11px] font-semibold uppercase">Patients</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-700 dark:hover:text-blue-300 active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined" data-icon="format_list_bulleted">format_list_bulleted</span>
<span class="font-inter text-[11px] font-semibold uppercase">Queue</span>
</div>
<div class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-700 dark:hover:text-blue-300 active:scale-95 transition-transform duration-100">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="font-inter text-[11px] font-semibold uppercase">Profile</span>
</div>
</nav>
</body></html>
