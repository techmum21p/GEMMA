<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "secondary": "#575f6b",
                        "surface-tint": "#3959b0",
                        "outline": "#747683",
                        "inverse-primary": "#b4c5ff",
                        "on-error-container": "#93000a",
                        "secondary-fixed": "#dbe3f1",
                        "primary": "#003087",
                        "background": "#faf8ff",
                        "on-background": "#1a1b21",
                        "inverse-surface": "#2f3036",
                        "tertiary-container": "#363838",
                        "surface-dim": "#dad9e1",
                        "surface-bright": "#faf8ff",
                        "on-primary-container": "#7f9df8",
                        "error-container": "#ffdad6",
                        "surface-container-low": "#f4f3fb",
                        "on-primary-fixed": "#00174b",
                        "on-error": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "error": "#ba1a1a",
                        "primary-fixed": "#dbe1ff",
                        "on-surface": "#1a1b21",
                        "on-tertiary-fixed-variant": "#454747",
                        "secondary-container": "#dbe3f1",
                        "on-tertiary-fixed": "#1a1c1c",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#e3e2ea",
                        "secondary-fixed-dim": "#bfc7d4",
                        "surface-container-high": "#e8e7ef",
                        "primary-fixed-dim": "#b4c5ff",
                        "on-secondary-container": "#5d6571",
                        "surface": "#faf8ff",
                        "surface-container": "#eeedf5",
                        "primary-container": "#003087",
                        "tertiary-fixed": "#e2e2e2",
                        "outline-variant": "#c4c6d4",
                        "on-tertiary-container": "#a0a1a1",
                        "on-surface-variant": "#444652",
                        "tertiary": "#212323",
                        "inverse-on-surface": "#f1f0f8",
                        "surface-container-highest": "#e3e2ea",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed-variant": "#3f4752",
                        "on-primary-fixed-variant": "#1c4197",
                        "tertiary-fixed-dim": "#c6c6c7",
                        "on-secondary-fixed": "#141c26"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "lg": "24px",
                        "base": "8px",
                        "sm": "8px",
                        "xs": "4px",
                        "md": "16px",
                        "margin-mobile": "16px",
                        "xl": "32px",
                        "gutter": "16px"
                    },
                    "fontFamily": {
                        "h2": ["Inter"],
                        "display": ["Inter"],
                        "caption": ["Inter"],
                        "h1": ["Inter"],
                        "body-lg": ["Inter"],
                        "label-md": ["Inter"],
                        "body-md": ["Inter"],
                        "label-bold": ["Inter"]
                    },
                    "fontSize": {
                        "h2": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "display": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "caption": ["12px", {"lineHeight": "16px", "fontWeight": "500"}],
                        "h1": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
                        "label-md": ["14px", {"lineHeight": "20px", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "label-bold": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "700"}]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen pb-[120px]">
<!-- TopAppBar -->
<header class="bg-white dark:bg-slate-900 shadow-sm border-b border-slate-200 dark:border-slate-800 flex justify-between items-center w-full px-4 h-16 sticky top-0 z-50">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined dark:text-blue-300 text-primary" data-icon="medical_cross">medical_services</span>
<span class="text-xl font-black dark:text-blue-100 uppercase tracking-widest font-inter font-bold tracking-tight text-primary">GEMMA</span>
</div>
<div class="flex items-center bg-blue-50 dark:bg-blue-900/30 px-3 py-1.5 rounded-full active:opacity-80 transition-opacity duration-150">
<span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>
<span class="text-[11px] font-bold dark:text-blue-300 uppercase tracking-wider">ON SHIFT</span>
</div>
</header>
<main class="px-margin-mobile pt-md space-y-md">
<!-- Header Image & Title -->
<div class="relative w-full h-24 rounded-xl overflow-hidden shadow-sm bg-primary-container flex items-center p-md"><h1 class="font-h1 text-h1 text-white">Patient Intake</h1></div>
<!-- Section 1: Demographics -->
<section class="bg-white rounded-xl border border-outline-variant p-md shadow-[0_2px_8px_rgba(0,0,0,0.02)] space-y-lg">
<div class="grid grid-cols-2 gap-md">
<!-- Age Stepper -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-secondary">Age</label>
<div class="flex items-center justify-between border-2 border-surface-variant rounded-lg h-14 px-2">
<button class="w-10 h-10 flex items-center justify-center text-primary-container active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="remove">remove</span>
</button>
<span class="font-h2 text-h2 text-on-surface">24</span>
<button class="w-10 h-10 flex items-center justify-center text-primary-container active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="add">add</span>
</button>
</div>
</div>
<!-- Sex Toggle -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-secondary">Sex</label>
<div class="flex h-14 bg-surface-container rounded-lg p-1">
<button class="flex-1 flex items-center justify-center rounded-md font-label-bold text-label-bold bg-primary-container text-white shadow-sm">M</button>
<button class="flex-1 flex items-center justify-center rounded-md font-label-bold text-label-bold text-secondary">F</button>
</div>
</div>
</div>
<!-- Name Input -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-secondary">Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="person">person</span>
<input class="w-full h-14 pl-12 pr-4 border-2 border-surface-variant focus:border-primary-container focus:ring-0 rounded-lg bg-surface-container-lowest placeholder:text-outline/50 transition-colors" placeholder="Optional" type="text"/>
</div>
</div>
</section>
<!-- Section 2: Chief Complaint -->
<section class="space-y-md">
<div class="flex items-center justify-between">
<h2 class="font-h2 text-h2 text-primary">Chief Complaint</h2>
<span class="text-caption font-caption text-secondary">Select all that apply</span>
</div>
<!-- Symptom Checklist (Scrollable Grid) -->
<div class="overflow-x-auto hide-scrollbar -mx-margin-mobile px-margin-mobile">
<div class="grid grid-rows-3 grid-flow-col gap-sm pb-2">
<!-- Symptom Chips -->
<button class="flex items-center gap-2 px-4 py-2 bg-primary-container text-white rounded-full border border-primary-container whitespace-nowrap shadow-sm">
<span class="material-symbols-outlined text-[18px]" data-icon="thermostat">thermostat</span>
<span class="text-label-md font-label-md">Lagnat/Fever</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="air">air</span>
<span class="text-label-md font-label-md">Ubo/Cough</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="psychology">psychology</span>
<span class="text-label-md font-label-md">Sakit ng ulo/Headache</span>
</button>
<!-- Column 2 -->
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="fluid_med">fluid_med</span>
<span class="text-label-md font-label-md">Sipon/Cold</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="stomach">gastroenterology</span>
<span class="text-label-md font-label-md">Hapdi ng tiyan</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="coronavirus">coronavirus</span>
<span class="text-label-md font-label-md">Pagkapagod/Fatigue</span>
</button>
<!-- Column 3 -->
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="pulmonology">pulmonology</span>
<span class="text-label-md font-label-md">Hirap huminga</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="ecg">ecg</span>
<span class="text-label-md font-label-md">Sakit ng dibdib</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="blind">blind</span>
<span class="text-label-md font-label-md">Pagkahilo/Dizziness</span>
</button>
<!-- Column 4 -->
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="person_alert">person_alert</span>
<span class="text-label-md font-label-md">Pagsusuka/Vomit</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="water_drop">water_drop</span>
<span class="text-label-md font-label-md">Pagtatae/Diarrhea</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 bg-white text-secondary rounded-full border border-outline-variant whitespace-nowrap active:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-[18px]" data-icon="skillet">skillet</span>
<span class="text-label-md font-label-md">Pantal/Rash</span>
</button>
</div>
</div>
<!-- Custom Symptoms -->
<div class="space-y-sm">
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-outline" data-icon="edit_note">edit_note</span>
<input class="w-full h-14 pl-12 pr-4 border-2 border-surface-variant focus:border-primary-container focus:ring-0 rounded-lg bg-surface-container-lowest transition-colors" placeholder="Add other symptoms..." type="text"/>
</div>
<!-- Dynamic List Area -->
<div class="bg-blue-50/50 rounded-lg p-md border border-blue-100/50">
<ul class="space-y-2">
<li class="flex items-center gap-3 text-body-md text-on-surface">
<span class="w-1.5 h-1.5 bg-primary-container rounded-full"></span>
<span>Loss of appetite for 2 days</span>
<button class="ml-auto text-outline"><span class="material-symbols-outlined text-[18px]" data-icon="close">close</span></button>
</li>
</ul>
</div>
</div>
</section>
<!-- Illustration Spacer -->
<div class="pt-md opacity-20 flex justify-center">
<img alt="" class="w-24 h-24 grayscale" data-alt="A minimalist vector illustration of medical symbols and abstract organic shapes in soft blue and white tones. The visual is designed to fill whitespace elegantly without distracting from the clinical focus of the application. The mood is serene and professional, consistent with a clean digital health interface." src="https://lh3.googleusercontent.com/aida/ADBb0ujHagzx9a7zP2Q4Kcd1QZDfwg8EEq85WFmCGJXnwI9uONU1uraAJ65K7XZ7y0eX2a2hBLdO15BfBY_FTVAeEDkewrieIyl5nU5yegBXVO2m1WZ7vZ86X5A3Ogl0xRJo_t2Pk7cSpNCW9HBRrfAffJFXjU97YgVrzqjFxF8UrqLPXjwMG-5R7WcyZ8C0C71YnoSEp1pQ_z7ZprsrvAADbSazbLy7oYSdbzjHy23XPtYq-bpwk1GlV91j8o0"/>
</div>
</main>
<!-- Bottom Action Area -->
<div class="fixed bottom-[72px] left-0 w-full bg-white/80 backdrop-blur-md p-4 space-y-3 border-t border-slate-100">
<button class="w-full h-[56px] border-2 border-primary-container text-primary-container font-label-bold text-label-bold rounded-xl flex items-center justify-center gap-2 active:bg-blue-50 transition-colors">
<span class="material-symbols-outlined" data-icon="photo_camera">photo_camera</span>
            ATTACH PHOTO
        </button>
<button class="w-full h-[56px] bg-primary-container text-white font-label-bold text-label-bold rounded-xl flex items-center justify-center gap-2 shadow-lg active:scale-[0.98] transition-all">
<span class="material-symbols-outlined" data-icon="analytics">analytics</span>
            ANALYZE
        </button>
</div>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-safe bg-white dark:bg-slate-950 border-t border-slate-200 dark:border-slate-800 h-[72px] z-50 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">
<a class="flex flex-col items-center justify-center text-blue-900 dark:text-blue-100 bg-blue-50 dark:bg-blue-900/40 rounded-xl px-4 py-1 active:scale-95 transition-transform duration-100" href="#">
<span class="material-symbols-outlined" data-icon="emergency" style="font-variation-settings: 'FILL' 1;">emergency</span>
<span class="font-inter text-[11px] font-semibold uppercase mt-0.5">Triage</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-700 dark:hover:text-blue-300 active:scale-95 transition-transform duration-100" href="#">
<span class="material-symbols-outlined" data-icon="group">group</span>
<span class="font-inter text-[11px] font-semibold uppercase mt-0.5">Patients</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-700 dark:hover:text-blue-300 active:scale-95 transition-transform duration-100" href="#">
<span class="material-symbols-outlined" data-icon="format_list_bulleted">format_list_bulleted</span>
<span class="font-inter text-[11px] font-semibold uppercase mt-0.5">Queue</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-blue-700 dark:hover:text-blue-300 active:scale-95 transition-transform duration-100" href="#">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
<span class="font-inter text-[11px] font-semibold uppercase mt-0.5">Profile</span>
</a>
</nav>
</body></html>
