<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>GEMMA - Start Duty</title>

                    "secondary": "#2e6b2e",

                    "secondary-fixed": "#b0f3a6",

                    "headline-md": ["Public Sans"],

                    "body-lg": ["Inter"]
            },
            "fontSize": {
                    "label-xl": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],

                    "headline-lg": ["24px", {"lineHeight": "32px", "fontWeight": "700"}],

                    "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "400"}]

          },
        },
      }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #f6fafe;
            font-family: 'Inter', sans-serif;
        }
        .font-public-sans {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- TopAppBar Component -->
<header class="bg-primary dark:bg-blue-950 text-white shadow-md docked full-width top-0 flex items-center justify-between px-4 h-16 w-full sticky z-50">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-white active:scale-95 transition-transform cursor-pointer" data-icon="arrow_back">arrow_back</span>
<div class="flex flex-col">
<span class="text-xl font-black text-white tracking-tight leading-none font-public-sans">GEMMA</span>
<span class="text-[10px] font-medium text-blue-200 tracking-wide uppercase">Gabay sa Triage ng Barangay</span>
</div>
</div>
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-blue-200 hover:opacity-80 transition-opacity" data-icon="account_circle">account_circle</span>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center px-4 py-8 max-w-md mx-auto w-full">
<!-- Hero Illustration or Iconography -->
<div class="mb-8 w-24 h-24 bg-primary-container rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white text-5xl" data-icon="health_and_safety" style="font-variation-settings: 'FILL' 1;">health_and_safety</span>
</div>
<div class="w-full space-y-6">
<!-- Main Content Card -->
<section class="bg-white rounded-[16px] p-6 shadow-[0px_2px_4px_rgba(27,58,107,0.08)] w-full">
<h1 class="font-headline-lg text-headline-lg text-primary mb-6 text-center">Start Duty</h1>
<div class="space-y-4">
<!-- Input: BHW Name -->
<div class="space-y-1">
<label class="font-label-bold text-[14px] text-on-surface-variant block ml-1" for="bhw_name">BHW Name</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-[8px] border border-primary focus:border-2 focus:ring-0 outline-none bg-white text-on-surface font-public-sans transition-all" id="bhw_name" placeholder="Hal. Maria Santos" type="text"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-outline" data-icon="person">person</span>
</div>
</div>
<!-- Input: Coordinator Email -->
<div class="space-y-1">
<label class="font-label-bold text-[14px] text-on-surface-variant block ml-1" for="coordinator_email">Coordinator Email</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-[8px] border border-primary focus:border-2 focus:ring-0 outline-none bg-white text-on-surface font-body-md transition-all" id="coordinator_email" placeholder="Hal. clinic@barangay.gov" type="email"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-outline" data-icon="mail">mail</span>
</div>
</div>
<!-- Read-only: Shift Date -->
<div class="space-y-1">
<label class="font-label-bold text-[14px] text-on-surface-variant block ml-1" for="shift_date">Shift Date</label>
<div class="relative">
<input class="w-full h-12 px-4 rounded-[8px] border border-surface-container-highest bg-surface-container-low text-on-surface-variant font-body-md cursor-not-allowed" id="shift_date" readonly="" type="text" value="October 24, 2023"/>
<span class="material-symbols-outlined absolute right-3 top-3 text-outline" data-icon="calendar_today">calendar_today</span>
</div>
</div>
</div>
</section>
<!-- Primary Action Button -->
<button class="w-full h-[52px] bg-primary text-on-primary rounded-[12px] font-button text-button shadow-md active:scale-[0.98] transition-transform flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                START SHIFT
            </button>
</div>
<!-- Footer / Attribution -->
<footer class="mt-12 text-center">
<p class="text-[10px] text-outline font-medium tracking-widest uppercase">
                GEMMA — Barangay Platero Health Center
            </p>
</footer>
</main>
<!-- BottomNavBar Component -->
<div class="h-[56px]"></div>
<nav class="fixed bottom-0 w-full h-[56px] z-50 flex justify-around items-center px-2 bg-white dark:bg-slate-900 shadow-[0_-2px_10px_rgba(27,58,107,0.08)] border-t border-slate-200 dark:border-slate-800">
<a class="flex flex-col items-center justify-center text-primary dark:text-blue-300 scale-110 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-public-sans text-[10px] font-bold uppercase tracking-wider">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
<span class="font-public-sans text-[10px] font-bold uppercase tracking-wider">Pasyente</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="receipt_long">receipt_long</span>
<span class="font-public-sans text-[10px] font-bold uppercase tracking-wider">Listahan</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-800 active:scale-90 transition-all duration-200" href="#">
<span class="material-symbols-outlined" data-icon="logout">logout</span>
<span class="font-public-sans text-[10px] font-bold uppercase tracking-wider">Shift</span>
</a>
</nav>
<!-- Background Decorative Element -->
<div class="fixed top-0 left-0 w-full h-full -z-10 opacity-5 pointer-events-none">
<div class="absolute top-0 right-0 w-64 h-64 bg-primary-container rounded-full blur-3xl -mr-32 -mt-32"></div>
<div class="absolute bottom-0 left-0 w-64 h-64 bg-secondary-container rounded-full blur-3xl -ml-32 -mb-32"></div>
</div>
</body></html>
